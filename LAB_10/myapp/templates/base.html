<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Lab 10{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #4e342e 0%, #3e2723 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Navigation */
        nav {
            background: #f8f9fa;
            padding: 15px 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
            justify-content: center;
        }

        nav a {
            text-decoration: none;
            color: #4e342e;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 8px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background: #4e342e;
            color: white;
        }

        nav a.active {
            background: #667eea;
            color: white;
        }

        /* Main Content */
        main {
            padding: 50px;
            min-height: 400px;
        }

        /* Footer */
        footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-top: 2px solid #e0e0e0;
            color: #666;
            font-size: 0.95rem;
        }

        /* Content Styles */
        .page-title {
            font-size: 2.5rem;
            color: #4e342e;
            margin-bottom: 20px;
            text-align: center;
        }

        .page-message {
            font-size: 1.2rem;
            color: #666;
            text-align: center;
            margin-bottom: 40px;
        }

        .info-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin: 30px 0;
        }

        .info-box h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .info-box p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        /* Form Styles */
        .form-container {
            max-width: 500px;
            margin: 0 auto;
            background: #f8f9fa;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .code-box {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            overflow-x: auto;
        }

        .code-box code {
            color: #66d9ef;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Django Lab 10</h1>
            <p>URL Dispatcher Demonstration</p>
        </header>

        <!-- Navigation using Django <code>{% templatetag openblock %} url {% templatetag closeblock %}</code> tag -->
        <nav>
            <ul>
                <li><a href="{% url 'home' %}" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>Home</a></li>
                <li><a href="{% url 'signin' %}" {% if request.resolver_match.url_name == 'signin' %}class="active"{% endif %}>Sign In</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main>
            {% block content %}
            {% endblock %}
        </main>

        <!-- Footer -->
        <footer>
            <p>Neekitasingh Rajput • 2441339 • Lab 10 - Django URL Dispatcher</p>
        </footer>
    </div>
</body>
</html>
