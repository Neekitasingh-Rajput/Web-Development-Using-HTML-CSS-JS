<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator - Lab 6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="calculator-page">
    <div class="container mt-5">
        <div class="card shadow-lg p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Simple Calculator</h2>
                <a href="index.html" class="btn btn-secondary">Back to Home</a>
            </div>

            <div class="calculator-container">
                <div class="mb-3">
                    <label for="number1" class="form-label">Enter First Number:</label>
                    <input type="number" class="form-control" id="number1" placeholder="Enter first number">
                </div>

                <div class="mb-3">
                    <label for="number2" class="form-label">Enter Second Number:</label>
                    <input type="number" class="form-control" id="number2" placeholder="Enter second number">
                </div>

                <div class="button-group mb-4">
                    <button onclick="calculate('add')" class="btn btn-primary">Add (+)</button>
                    <button onclick="calculate('subtract')" class="btn btn-warning">Subtract (-)</button>
                    <button onclick="calculate('multiply')" class="btn btn-info">Multiply (×)</button>
                    <button onclick="calculate('divide')" class="btn btn-danger">Divide (÷)</button>
                </div>

                <div id="result" class="alert alert-info text-center" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
